<section class="auth-shell">
  <div class="auth-backdrop"></div>

  <article class="auth-card">
    <p class="auth-kicker">Restricted access</p>
    <h1>Admin Login</h1>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submit()">
      <label>
        <span>Email</span>
        <input type="email" placeholder="Enter admin email" formControlName="email" autocomplete="username" />
      </label>

      <label>
        <span>Password</span>
//HEAD
        <input type="password" placeholder="Enter password" formControlName="password" autocomplete="current-password" />
//
        <div class="password-field">
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter password"
            formControlName="password"
          />
          <button
            type="button"
            class="password-toggle"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            (click)="togglePasswordVisibility()"
          >
            <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
//7f9ea7109b049d12a3c0d98ac96604b20594d1a6
      </label>

      @if (errorMessage) {
        <p class="error-msg">{{ errorMessage }}</p>
      }

      <button type="submit" class="cta" [class.ready-btn]="loginForm.valid" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login as admin' }}
      </button>
    </form>

    <p class="auth-switch">
      User login?
      <a routerLink="/login">Go to user login</a>
    </p>
  </article>
</section>
